version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: uniresolve_mysql_container
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: Sundaysummer
      MYSQL_DATABASE: uniresolve_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # ◄ ADD THIS HEALTHCHECK BLOCK BELOW
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pYourChosenPasswordHere"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data: